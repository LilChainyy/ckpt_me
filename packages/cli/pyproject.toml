[project]
name = "ckpt"
version = "0.1.0"
description = "The reasoning layer for every code change"
requires-python = ">=3.9"
dependencies = [
    "click>=8.1.0",
    "httpx>=0.27.0",
]

[project.scripts]
ckpt = "ckpt.cli:main"

[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
